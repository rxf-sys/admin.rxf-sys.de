<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<title>rxf-sys admin · Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"/>
<link rel="stylesheet" href="tokens.css"/>
<link rel="stylesheet" href="layout.css"/>
<style>
  html, body { height: 100%; margin: 0; background: #07090e; }
  #root { height: 100vh; }
  /* Tooltip helper */
  .tip-wrap { position: relative; }
  .tip-wrap::after {
    content: attr(data-tip);
    position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
    background: var(--bg-1); color: var(--text-1); font-size: 11px;
    padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border-2);
    white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 120ms;
    font-family: var(--font-sans); z-index: 999;
  }
  .tip-wrap:hover::after { opacity: 1; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="dashboard.jsx"></script>
<script type="text/babel" src="drawer.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function Canvas() {
  return (
    <DesignCanvas title="rxf-sys admin · Dashboard Designs" subtitle="Dark-Admin · single-page · 12-col responsive · live simulation">
      <DCSection id="main" title="Main Dashboard · Desktop">
        <DCArtboard id="desktop-1440" label="1440 × 900 — Hauptansicht (live)" width={1440} height={900}>
          <div className="artboard-frame" data-screen-label="01 Main Dashboard Desktop">
            <FullDashboard mobile={false}/>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="mobile" title="Mobile · Stacked">
        <DCArtboard id="mobile-390" label="390 × 1600 — iPhone 14 Pro" width={390} height={1600}>
          <div className="mobile-frame" data-screen-label="02 Mobile">
            <FullDashboard mobile={true}/>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="components" title="Komponenten-Showcase">
        <DCArtboard id="showcase" label="Bausteine isoliert" width={1100} height={1400}>
          <div data-screen-label="03 Component Showcase" style={{height: '100%'}}>
            <Showcase/>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="tokens" title="Design Tokens">
        <DCArtboard id="tokens-doc" label="CSS Variables · Spec für Frontend" width={1100} height={1600}>
          <div data-screen-label="04 Design Tokens" style={{height: '100%', overflow: 'auto', background: 'var(--bg-0)'}}>
            <TokensDoc/>
          </div>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Canvas/>);
</script>
</body>
</html>
