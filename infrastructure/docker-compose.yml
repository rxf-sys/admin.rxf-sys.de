services:
  backend:
    build:
      context: ../backend
    image: rxf-sys/admin-backend:latest
    container_name: rxf-admin-backend
    restart: unless-stopped
    env_file:
      - ./.env
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - admin

  web:
    build:
      context: ../frontend
    image: rxf-sys/admin-web:latest
    container_name: rxf-admin-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # cloudflared on CT 104 forwards admin.rxf-sys.de -> http://192.168.2.210:80
      - "80:80"
    networks:
      - admin

networks:
  admin:
    driver: bridge
